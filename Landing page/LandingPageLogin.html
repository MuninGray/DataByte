<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page | proyecto</title>
    <link rel="stylesheet" href="LandingPageLogin.css">
</head>
<body>
    <!-- Contenedor para login -->
    <div class="contenedor_login">

        <h1>Login</h1>
        <form action="">
            <!-- etiqueta de correo para logear -->
             <label for="correo">Correo:</label>
            <input type="text" name="correo" id="correo"><br><br>

            <!-- Etiqueta de Cedula de identidad para el logear -->
            <label for="CI">CI:</label>
            <input type="text" name="CI" id="CI"><br><br>

            <!-- Etiqueta de contraseña para el logear -->
            <label for="contraseña">Contraseña:</label>
            <input type="text" name="contraseña" id="contraseña"><br><br>
        </form>

        <!-- Biton para confirmar el logeo del usuario -->
        <a href="LandingPage.html">log-in</log-in></a>
        <!-- Boton que te redirige a la landing page -->
        <a href="LandingPage.html">Cancelar</a>
    </div>
</body>
</html>
